<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBERIA.EXE // LAYER:06</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    background:#00000d;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;overflow:hidden;
    font-family:'Share Tech Mono',monospace;color:#9fcfdf;
  }
  #wrap{text-align:center;user-select:none;}
  #label{font-size:8px;letter-spacing:3px;color:#0088aa;padding:2px 0 4px;}
  canvas{
    border:1px solid #003d6e;border-top:2px solid #0066aa;
    cursor:none;display:block;margin:0 auto;background:#00000d;
    box-shadow:0 0 30px rgba(0,150,220,0.18);
  }
  #status-bar{
    display:flex;justify-content:space-between;align-items:center;
    font-size:7px;letter-spacing:2px;color:#1a3548;margin-top:3px;
    padding:0 2px;
  }
  #hint-text{color:#0088aa;font-size:7px;letter-spacing:2px;margin-top:2px;min-height:10px;transition:opacity 0.5s;}
  /* Scanline overlay */
  #wrap::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:10;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 4px);
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="label">● ○ ○&nbsp;&nbsp;CYBERIA.EXE&nbsp;&nbsp;//&nbsp;<span id="layer-label">LAYER:01</span></div>
  <canvas id="lain-c" width="360" height="260"></canvas>
  <div id="status-bar">
    <span id="combo-display"></span>
    <span id="hint-text">[ CLICK TO ENTER THE WIRED ]</span>
    <span id="power-display"></span>
  </div>
</div>
<script>
(function(){
'use strict';
var cv=document.getElementById('lain-c');
var ctx=cv.getContext('2d');
var W=cv.width,H=cv.height,CX=W/2,CY=H/2;
var layerLabel=document.getElementById('layer-label');
var hintText=document.getElementById('hint-text');
var comboDisplay=document.getElementById('combo-display');
var powerDisplay=document.getElementById('power-display');
var CELL=20;
var COLS=17;
var ROWS=11;
var MAZE_W=COLS*CELL;
var MAZE_H=ROWS*CELL;
var OFFSET_X=(W-MAZE_W)/2;
var OFFSET_Y=28;
var score=0,lives=3,frame=0,running=false,started=false;
var floor=1;
var highScore=0;
var powerActive=false,powerTimer=0,powerCooldown=0;
var shake=0,flash=0;
var maze=[];
var nodes=[];
var enemies=[];
var particles=[];
var exitNode={x:COLS-2,y:ROWS-2,open:false};
var player={x:1,y:1,px:0,py:0,tx:1,ty:1,moving:false,step:0,speed:0.18,trail:0};
var keys={};

function rnd(a,b){return a+Math.random()*(b-a);}
function layerStr(n){return 'LAYER:'+(n<10?'0':'')+n;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function cellCenterX(x){return OFFSET_X+x*CELL+CELL/2;}
function cellCenterY(y){return OFFSET_Y+y*CELL+CELL/2;}
function isWall(x,y){return x<0||y<0||x>=COLS||y>=ROWS||maze[y][x]===1;}
function dirs(){return[[1,0],[-1,0],[0,1],[0,-1]];}

function showHint(msg){
  hintText.textContent=msg;
}

function addParticles(x,y,count,color){
  var rgb=color||'0,212,255';
  for(var i=0;i<count;i++){
    var ang=rnd(0,Math.PI*2),spd=rnd(0.6,2.8);
    particles.push({x:x,y:y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:20,col:rgb});
  }
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=arr[i];arr[i]=arr[j];arr[j]=t;
  }
  return arr;
}

function buildMaze(){
  var x,y;
  maze=[];
  for(y=0;y<ROWS;y++){
    maze[y]=[];
    for(x=0;x<COLS;x++)maze[y][x]=1;
  }
  function carve(cx,cy){
    maze[cy][cx]=0;
    var order=shuffle([[2,0],[-2,0],[0,2],[0,-2]]);
    for(var i=0;i<order.length;i++){
      var nx=cx+order[i][0],ny=cy+order[i][1];
      if(nx>0&&ny>0&&nx<COLS-1&&ny<ROWS-1&&maze[ny][nx]===1){
        maze[cy+order[i][1]/2][cx+order[i][0]/2]=0;
        carve(nx,ny);
      }
    }
  }
  carve(1,1);
  maze[1][1]=0;
  maze[ROWS-2][COLS-2]=0;
}

function openCells(){
  var cells=[];
  for(var y=1;y<ROWS-1;y++){
    for(var x=1;x<COLS-1;x++){
      if(!isWall(x,y))cells.push({x:x,y:y});
    }
  }
  return cells;
}

function randomOpenCell(minDist){
  var cells=openCells();
  var filtered=[];
  for(var i=0;i<cells.length;i++){
    var d=Math.abs(cells[i].x-1)+Math.abs(cells[i].y-1);
    if(d>=minDist&&!(cells[i].x===COLS-2&&cells[i].y===ROWS-2))filtered.push(cells[i]);
  }
  return filtered[Math.floor(Math.random()*filtered.length)]||cells[0];
}

function makeEnemy(type){
  var spot=randomOpenCell(6);
  return {
    x:spot.x,y:spot.y,px:spot.x,py:spot.y,tx:spot.x,ty:spot.y,
    moving:false,step:0,speed:type==='fast'?0.22:type==='heavy'?0.11:type==='ghost'?0.17:0.15,
    type:type,stun:0,phase:rnd(0,Math.PI*2),dir:[0,0]
  };
}

function spawnFloor(){
  buildMaze();
  nodes=[];
  enemies=[];
  exitNode={x:COLS-2,y:ROWS-2,open:false};
  player.x=1;player.y=1;player.px=1;player.py=1;player.tx=1;player.ty=1;player.moving=false;player.step=0;
  var nodeCount=Math.min(6,3+Math.floor(floor/2));
  for(var i=0;i<nodeCount;i++){
    var cell=randomOpenCell(4);
    var unique=true;
    for(var n=0;n<nodes.length;n++)if(nodes[n].x===cell.x&&nodes[n].y===cell.y)unique=false;
    if(unique)nodes.push({x:cell.x,y:cell.y,collected:false,pulse:rnd(0,Math.PI*2)});
    else i--;
  }
  enemies.push(makeEnemy('std'));
  enemies.push(makeEnemy('std'));
  if(floor>=2)enemies.push(makeEnemy('heavy'));
  if(floor>=3)enemies.push(makeEnemy('fast'));
  if(floor>=5)enemies.push(makeEnemy('ghost'));
  flash=24;
  layerLabel.textContent=layerStr(floor);
  showHint('COLLECT ALL SIGNAL NODES // FIND EXIT');
}

function walkDir(dx,dy){
  if(player.moving||!running)return;
  var nx=player.x+dx,ny=player.y+dy;
  if(isWall(nx,ny))return;
  player.px=player.x;player.py=player.y;
  player.tx=nx;player.ty=ny;player.moving=true;player.step=0;
}

function usePower(){
  if(powerActive||powerCooldown>0||!running)return;
  powerActive=true;
  powerTimer=180;
  powerCooldown=540;
  showHint('ISOLATION.EXE // HOSTILE SIGNAL DEGRADED');
  addParticles(cellCenterX(player.x),cellCenterY(player.y),18,'180,0,255');
}

function takeHit(){
  lives--;
  shake=10;
  addParticles(cellCenterX(player.x),cellCenterY(player.y),16,'255,0,60');
  if(lives<=0){
    running=false;
    if(score>highScore)highScore=score;
    showHint('CONNECTION LOST');
    return;
  }
  player.x=1;player.y=1;player.px=1;player.py=1;player.tx=1;player.ty=1;player.moving=false;player.step=0;
  showHint('SIGNAL CORRUPTED // RETURN TO ENTRY');
}

function floorClear(){
  score+=150+floor*40;
  floor++;
  if(score>highScore)highScore=score;
  spawnFloor();
}

function updatePlayer(){
  if(player.moving){
    player.step+=player.speed;
    if(player.step>=1){
      player.x=player.tx;player.y=player.ty;player.px=player.x;player.py=player.y;player.moving=false;player.step=0;
    }
  } else {
    if(keys.ArrowUp||keys.w||keys.W)walkDir(0,-1);
    else if(keys.ArrowDown||keys.s||keys.S)walkDir(0,1);
    else if(keys.ArrowLeft||keys.a||keys.A)walkDir(-1,0);
    else if(keys.ArrowRight||keys.d||keys.D)walkDir(1,0);
  }
}

function enemyMove(enemy){
  if(enemy.moving)return;
  var options=[];
  var d=dirs();
  for(var i=0;i<d.length;i++){
    var nx=enemy.x+d[i][0],ny=enemy.y+d[i][1];
    if(!isWall(nx,ny))options.push({x:nx,y:ny,dx:d[i][0],dy:d[i][1]});
  }
  if(!options.length)return;
  var target=options[Math.floor(Math.random()*options.length)];
  var chaseChance=enemy.type==='fast'?0.8:enemy.type==='ghost'?0.65:enemy.type==='heavy'?0.45:0.55;
  if(Math.random()<chaseChance){
    var best=target;
    var bestDist=9999;
    for(i=0;i<options.length;i++){
      var dist=Math.abs(options[i].x-player.x)+Math.abs(options[i].y-player.y);
      if(dist<bestDist){bestDist=dist;best=options[i];}
    }
    target=best;
  }
  enemy.px=enemy.x;enemy.py=enemy.y;
  enemy.tx=target.x;enemy.ty=target.y;
  enemy.moving=true;enemy.step=0;enemy.dir=[target.dx,target.dy];
}

function updateEnemies(){
  for(var i=0;i<enemies.length;i++){
    var enemy=enemies[i];
    if(enemy.stun>0){enemy.stun--;continue;}
    if(enemy.moving){
      enemy.step+=enemy.speed*(powerActive?0.45:1);
      if(enemy.step>=1){
        enemy.x=enemy.tx;enemy.y=enemy.ty;enemy.px=enemy.x;enemy.py=enemy.y;enemy.moving=false;enemy.step=0;
      }
    } else {
      enemyMove(enemy);
    }
    if(enemy.x===player.x&&enemy.y===player.y&&!player.moving&&!enemy.moving){
      takeHit();
      break;
    }
  }
}

function updateNodes(){
  var collected=0;
  for(var i=0;i<nodes.length;i++){
    nodes[i].pulse+=0.08;
    if(!nodes[i].collected&&nodes[i].x===player.x&&nodes[i].y===player.y&&!player.moving){
      nodes[i].collected=true;
      score+=40;
      addParticles(cellCenterX(nodes[i].x),cellCenterY(nodes[i].y),14,'0,212,255');
      showHint('SIGNAL NODE RETRIEVED');
    }
    if(nodes[i].collected)collected++;
  }
  exitNode.open=collected===nodes.length;
  if(exitNode.open&&player.x===exitNode.x&&player.y===exitNode.y&&!player.moving){
    floorClear();
  }
}

function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function drawBackground(){
  ctx.fillStyle='rgba(0,0,13,0.96)';
  ctx.fillRect(0,0,W,H);
  for(var i=0;i<7;i++){
    var sc=((i/7)+(frame*0.003))%1;
    sc=sc*sc;
    ctx.strokeStyle='rgba(0,120,190,'+(0.04+sc*0.1)+')';
    ctx.strokeRect(CX-(W*sc*0.46),CY-(H*sc*0.38),W*sc*0.92,H*sc*0.76);
  }
}

function drawMaze(){
  var x,y;
  ctx.fillStyle='rgba(0,8,18,0.9)';
  ctx.fillRect(OFFSET_X,OFFSET_Y,MAZE_W,MAZE_H);
  for(y=0;y<ROWS;y++){
    for(x=0;x<COLS;x++){
      var px=OFFSET_X+x*CELL;
      var py=OFFSET_Y+y*CELL;
      if(maze[y][x]===1){
        ctx.fillStyle='rgba(6,22,40,0.98)';
        ctx.fillRect(px,py,CELL,CELL);
        ctx.strokeStyle='rgba(0,120,190,0.16)';
        ctx.strokeRect(px+0.5,py+0.5,CELL-1,CELL-1);
      } else {
        ctx.fillStyle='rgba(0,20,34,0.35)';
        ctx.fillRect(px,py,CELL,CELL);
      }
    }
  }
}

function drawNodes(){
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    if(n.collected)continue;
    var cx=cellCenterX(n.x),cy=cellCenterY(n.y);
    var pulse=0.55+0.45*Math.sin(n.pulse);
    ctx.strokeStyle='rgba(0,212,255,'+(0.45+pulse*0.4)+')';
    ctx.shadowBlur=10;ctx.shadowColor='#00d4ff';
    ctx.beginPath();ctx.arc(cx,cy,4+pulse*2,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-6,cy);ctx.lineTo(cx+6,cy);ctx.moveTo(cx,cy-6);ctx.lineTo(cx,cy+6);ctx.stroke();
    ctx.shadowBlur=0;
  }
}

function drawExit(){
  var ex=OFFSET_X+exitNode.x*CELL;
  var ey=OFFSET_Y+exitNode.y*CELL;
  var pulse=0.5+0.5*Math.sin(frame*0.08);
  ctx.strokeStyle=exitNode.open?'rgba(180,0,255,'+(0.5+pulse*0.4)+')':'rgba(40,70,100,0.45)';
  ctx.lineWidth=1.5;
  ctx.strokeRect(ex+3,ey+3,CELL-6,CELL-6);
  ctx.strokeRect(ex+6,ey+6,CELL-12,CELL-12);
}

function drawEnemy(enemy){
  var t=enemy.moving?enemy.step:0;
  var gx=cellCenterX(enemy.px+(enemy.tx-enemy.px)*t);
  var gy=cellCenterY(enemy.py+(enemy.ty-enemy.py)*t);
  var alpha=enemy.type==='ghost'?(0.35+0.35*Math.sin(frame*0.12+enemy.phase)):(enemy.stun>0?0.3:1);
  ctx.save();ctx.translate(gx,gy);ctx.rotate(frame*0.03+enemy.phase);
  if(enemy.type==='fast'){
    ctx.strokeStyle='rgba(255,140,0,'+alpha+')';ctx.shadowBlur=8;ctx.shadowColor='#ff9900';
    ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(7,0);ctx.moveTo(0,-7);ctx.lineTo(0,7);ctx.stroke();
  } else if(enemy.type==='heavy'){
    ctx.strokeStyle='rgba(190,0,255,'+alpha+')';ctx.shadowBlur=10;ctx.shadowColor='#bb00ff';
    ctx.beginPath();
    for(var s=0;s<8;s++){
      var ang=s/8*Math.PI*2;
      s===0?ctx.moveTo(Math.cos(ang)*6,Math.sin(ang)*6):ctx.lineTo(Math.cos(ang)*6,Math.sin(ang)*6);
    }
    ctx.closePath();ctx.stroke();
  } else if(enemy.type==='ghost'){
    ctx.strokeStyle='rgba(0,255,170,'+alpha+')';ctx.shadowBlur=10;ctx.shadowColor='#00ffaa';
    ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(6,4);ctx.lineTo(-6,4);ctx.closePath();ctx.stroke();
  } else {
    ctx.strokeStyle='rgba(255,0,60,'+alpha+')';ctx.shadowBlur=8;ctx.shadowColor='#ff003c';
    ctx.beginPath();ctx.moveTo(0,-6);ctx.lineTo(6,0);ctx.lineTo(0,6);ctx.lineTo(-6,0);ctx.closePath();ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer(){
  var t=player.moving?player.step:0;
  var gx=cellCenterX(player.px+(player.tx-player.px)*t);
  var gy=cellCenterY(player.py+(player.ty-player.py)*t);
  var pulse=0.55+0.45*Math.sin(frame*0.15);
  ctx.save();ctx.translate(gx,gy);
  ctx.strokeStyle=powerActive?'rgba(180,0,255,0.95)':'rgba(0,212,255,0.95)';
  ctx.shadowBlur=12;ctx.shadowColor=powerActive?'#bb00ff':'#00d4ff';
  ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-3,0);ctx.moveTo(3,0);ctx.lineTo(8,0);ctx.moveTo(0,-8);ctx.lineTo(0,-3);ctx.moveTo(0,3);ctx.lineTo(0,8);ctx.stroke();
  if(powerActive){
    ctx.beginPath();ctx.arc(0,0,8+pulse*3,0,Math.PI*2);ctx.strokeStyle='rgba(180,0,255,0.35)';ctx.stroke();
  }
  ctx.restore();
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.fillStyle='rgba('+p.col+','+(p.life/20)+')';
    ctx.fillRect(p.x-1,p.y-1,2,2);
  }
}

function drawHud(){
  ctx.fillStyle='rgba(0,0,13,0.84)';
  ctx.fillRect(0,0,W,18);
  ctx.fillStyle='#00d4ff';
  ctx.font='bold 9px monospace';
  ctx.fillText('SCR:'+score,6,13);
  ctx.fillText('LIF:'+new Array(lives+1).join('■')+new Array(Math.max(0,3-lives)+1).join('□'),120,13);
  ctx.fillText('NODES:'+countNodes()+'/'+nodes.length,214,13);
  ctx.fillText('F'+floor,W-26,13);
}

function countNodes(){
  var found=0;
  for(var i=0;i<nodes.length;i++)if(nodes[i].collected)found++;
  return found;
}

function drawOverlay(){
  if(flash>0){
    ctx.fillStyle='rgba(0,212,255,'+(flash/24*0.15)+')';
    ctx.fillRect(0,0,W,H);
    flash--;
  }
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,13,0.88)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.shadowBlur=18;ctx.shadowColor='#ff003c';
  ctx.fillStyle='#ff003c';ctx.font='bold 24px "VT323",monospace';
  ctx.fillText('CONNECTION LOST',CX,CY-26);
  ctx.shadowBlur=0;
  ctx.fillStyle='#00d4ff';ctx.font='9px monospace';
  ctx.fillText('SCORE: '+score+'   FLOOR: '+floor,CX,CY);
  ctx.fillText('BEST: '+highScore,CX,CY+16);
  ctx.fillStyle='#0088aa';
  ctx.fillText('[ CLICK TO RECONNECT ]',CX,CY+36);
  ctx.textAlign='left';
}

function loop(){
  frame++;
  var sx=0,sy=0;
  if(shake>0){shake--;sx=rnd(-3,3);sy=rnd(-2,2);}

  if(running){
    if(powerActive){
      powerTimer--;
      for(var i=0;i<enemies.length;i++)enemies[i].stun=Math.max(enemies[i].stun,1);
      if(powerTimer<=0)powerActive=false;
    }
    if(powerCooldown>0)powerCooldown--;
    updatePlayer();
    updateEnemies();
    updateNodes();
    updateParticles();
  }

  ctx.save();
  if(sx||sy)ctx.translate(sx,sy);
  drawBackground();
  if(started){
    drawMaze();
    drawExit();
    drawNodes();
    for(var e=0;e<enemies.length;e++)drawEnemy(enemies[e]);
    drawPlayer();
    drawParticles();
    drawHud();
    drawOverlay();
    if(!running)drawGameOver();
  } else {
    drawTitle();
  }
  ctx.restore();

  comboDisplay.textContent='MOVE://WASD/ARROWS';
  powerDisplay.textContent=powerActive?'PWR:ACTIVE':powerCooldown>0?'PWR:'+Math.round((1-powerCooldown/540)*100)+'%':'PWR:READY [R/SPC]';
  requestAnimationFrame(loop);
}

function drawTitle(){
  ctx.fillStyle='rgba(0,0,13,0.97)';ctx.fillRect(0,0,W,H);
  for(var i=0;i<6;i++){
    var sc=((i/6)+(frame*0.004))%1;sc=sc*sc;
    ctx.strokeStyle='rgba(0,180,255,'+(0.06+sc*0.16)+')';
    ctx.strokeRect(CX-W*sc*0.42,CY-H*sc*0.32,W*sc*0.84,H*sc*0.64);
  }
  ctx.textAlign='center';
  ctx.shadowBlur=18;ctx.shadowColor='#00d4ff';
  ctx.fillStyle='#00d4ff';ctx.font='bold 24px "VT323",monospace';
  ctx.fillText('CYBERIA LABYRINTH',CX,CY-42);
  ctx.shadowBlur=0;
  ctx.fillStyle='#0088aa';ctx.font='8px monospace';
  ctx.fillText('WALK THE WIRED // RETRIEVE SIGNAL NODES // FIND THE EXIT',CX,CY-18);
  ctx.fillStyle='#9fcfdf';ctx.font='9px monospace';
  ctx.fillText('WASD OR ARROWS TO MOVE',CX,CY+4);
  ctx.fillText('R OR SPACE TO USE ISOLATION.EXE',CX,CY+18);
  ctx.fillStyle='#003d6e';ctx.font='7px monospace';
  ctx.fillText('FAST, HEAVY, GHOST ENTITIES PATROL EACH FLOOR',CX,CY+36);
  if(Math.sin(frame*0.08)>0)ctx.fillText('[ CLICK TO ENTER THE WIRED ]',CX,CY+58);
  if(highScore>0){
    ctx.fillStyle='#004466';ctx.fillText('BEST: '+highScore,CX,CY+74);
  }
  ctx.textAlign='left';
}

function startRun(){
  if(score>highScore)highScore=score;
  score=0;lives=3;floor=1;powerActive=false;powerTimer=0;powerCooldown=0;particles=[];
  running=true;started=true;
  spawnFloor();
}

cv.addEventListener('click',function(){
  if(!started||!running){startRun();}
});

document.addEventListener('keydown',function(e){
  keys[e.key]=true;
  if(e.key===' '||e.key==='r'||e.key==='R'){
    e.preventDefault();
    usePower();
  }
});

document.addEventListener('keyup',function(e){
  keys[e.key]=false;
});

showHint('[ CLICK TO ENTER THE WIRED ]');
loop();
})();
</script>
</body>
</html>
