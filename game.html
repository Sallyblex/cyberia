<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

</style>

<body>

  <div style="text-align:center;padding:30px;border:1px solid #444444;border-top:2px solid #888888;background:rgba(20,20,30,0.9);box-shadow:0 0 40px rgba(100,100,120,0.2);min-width:340px;">
    <div style="font-family:'VT323',monospace;font-size:28px;color:#ffffff;text-shadow:0 0 20px #ffffff;margin-bottom:8px;letter-spacing:3px;">PHANTOMa</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:7px;color:#aaaaaa;letter-spacing:2px;margin-bottom:20px;">// AUTHORIZATION REQUIRED //</div>
    <div style="font-family:'Share Tech Mono',monospace;font-size:8px;color:#888888;margin-bottom:14px;line-height:1.6;">WIRED ACCESS PROTOCOL<br>CREDENTIALS HIDDEN ON PROFILE<br>SEEK THE DEEPER LAYERS</div>
    <input type="text" id="login-user" placeholder="USERNAME" style="width:100%;padding:8px 10px;margin-bottom:10px;background:#14141e;border:1px solid #444444;color:#ffffff;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;outline:none;" />
    <input type="password" id="login-pass" placeholder="PASSWORD" style="width:100%;padding:8px 10px;margin-bottom:14px;background:#14141e;border:1px solid #444444;color:#ffffff;font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;outline:none;" />
    <button id="login-btn" style="width:100%;padding:10px;background:#1a1a2e;border:1px solid #666666;border-top:2px solid #aaaaaa;color:#ffffff;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;cursor:pointer;transition:all 0.3s;text-shadow:0 0 8px #ffffff;">► CONNECT TO WIRED</button>

<div id="wrap" style="display:none;">
  <div id="label">● ○ ○&nbsp;&nbsp;PHANTOMa&nbsp;&nbsp;//&nbsp;<span id="layer-label">LAYER:01</span></div>
  <canvas id="lain-c" width="960" height="600"></canvas>
  <div id="status-bar">
    <span id="combo-display"></span>
    <span id="hint-text">[ CLICK TO ENTER THE WIRED ]</span>
    <span id="power-display"></span>
  </div>

<script>
(function(){
'use strict';

// === AUDIO SYSTEM ===
var audioCtx=null;
var masterVolume=0.3;

function initAudio(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }catch(e){console.log('Audio not supported');}
}

function playTone(freq,duration,type,vol){
  if(!audioCtx)return;
  var osc=audioCtx.createOscillator();
  var gain=audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type=type||'sine';
  osc.frequency.value=freq;
  gain.gain.value=(vol||0.1)*masterVolume;
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime+duration);
}

function sndStep(){playTone(80,0.05,'square',0.03);}
function sndCollect(){playTone(880,0.15,'sine',0.15);playTone(1320,0.2,'sine',0.1);}
function sndHit(){playTone(120,0.3,'sawtooth',0.2);playTone(60,0.4,'square',0.15);}
function sndPower(){playTone(440,0.1,'sine',0.12);playTone(660,0.15,'sine',0.1);playTone(880,0.2,'sine',0.08);}
function sndExit(){playTone(660,0.2,'triangle',0.12);playTone(880,0.25,'triangle',0.1);playTone(1100,0.3,'triangle',0.08);}
function sndAmbient(){if(audioCtx&&Math.random()<0.02)playTone(rnd(40,80),0.3,'triangle',0.02);}

var cv=document.getElementById('lain-c');
var ctx=cv.getContext('2d');
var W=cv.width,H=cv.height;
var layerLabel=document.getElementById('layer-label');
var hintText=document.getElementById('hint-text');
var comboDisplay=document.getElementById('combo-display');
var powerDisplay=document.getElementById('power-display');

// RAYCASTING CONFIG
var FOV=Math.PI/3; // 60 degrees
var HALF_FOV=FOV/2;
var NUM_RAYS=W;
var MAX_DEPTH=16;
var DELTA_ANGLE=FOV/NUM_RAYS;

// GRID
var COLS=17,ROWS=11;
var maze=[];

// GAME STATE
var score=0,lives=3,floor=1,frame=0,running=false,started=false;
var powerActive=false,powerTimer=0,powerCooldown=0;
var shake=0,flash=0,highScore=0;
var nodes=[],enemies=[],particles=[];
var exitNode={x:COLS-1.5,y:ROWS-1.5,unlocked:false};
var transitioning=false;

// PLAYER (x,y in grid coords, angle in radians)
var player={x:1.5,y:1.5,angle:0,moveSpeed:0.05,rotSpeed:0.05};
var keys={};
var lastStepFrame=0;

function rnd(a,b){return a+Math.random()*(b-a);}
function layerStr(n){return 'LAYER:'+(n<10?'0':'')+n;}
function showHint(msg){hintText.textContent=msg;}

// --- MAZE GENERATION ---
function buildMaze(){
  maze=[];
  for(var y=0;y<ROWS;y++){maze[y]=[];for(var x=0;x<COLS;x++)maze[y][x]=1;}
  var stack=[];
  var cx=1,cy=1;
  maze[cy][cx]=0;
  stack.push([cx,cy]);
  while(stack.length>0){
    var dirs=[[2,0],[-2,0],[0,2],[0,-2]];
    dirs.sort(function(){return Math.random()-0.5;});
    var carved=false;
    for(var i=0;i<4;i++){
      var nx=cx+dirs[i][0],ny=cy+dirs[i][1];
      if(nx>0&&ny>0&&nx<COLS-1&&ny<ROWS-1&&maze[ny][nx]===1){
        maze[cy+dirs[i][1]/2][cx+dirs[i][0]/2]=0;
        maze[ny][nx]=0;
        stack.push([cx,cy]);
        cx=nx;cy=ny;
        carved=true;
        break;
      }
    }
    if(!carved){var p=stack.pop();cx=p[0];cy=p[1];}
  }
  maze[1][1]=0;
  maze[ROWS-2][COLS-2]=0;
}

function isWall(x,y){
  var gx=Math.floor(x),gy=Math.floor(y);
  if(gx<0||gy<0||gx>=COLS||gy>=ROWS)return true;
  return maze[gy][gx]===1;
}

// --- SPAWN FLOOR ---
function spawnFloor(){
  buildMaze();
  nodes=[];
  var count=3+Math.min(3,Math.floor(floor/2));
  var maxAttempts=count*50;
  var attempts=0;
  for(var i=0;i<count&&attempts<maxAttempts;i++){
    var nx,ny,tries=0;
    do{
      nx=1+Math.floor(Math.random()*(COLS-2));
      ny=1+Math.floor(Math.random()*(ROWS-2));
      tries++;
      attempts++;
    }while((maze[ny][nx]===1||(nx===1&&ny===1)||(nx===COLS-2&&ny===ROWS-2)||
           nodes.some(function(n){return Math.floor(n.x)===nx&&Math.floor(n.y)===ny;}))&&tries<50&&attempts<maxAttempts);
    if(tries<50)nodes.push({x:nx+0.5,y:ny+0.5,collected:false,pulse:0});
  }
  exitNode={x:COLS-1.5,y:ROWS-1.5,unlocked:false};
  
  // Spawn enemies
  enemies=[];
  var eCount=2+Math.floor(floor*1.2);
  for(var e=0;e<eCount;e++){
    var ex,ey,t2=0;
    do{
      ex=2+Math.floor(Math.random()*(COLS-4));
      ey=2+Math.floor(Math.random()*(ROWS-4));
      t2++;
      if(t2>=100)break;
    }while(maze[ey][ex]===1||Math.abs(ex-player.x)<2||Math.abs(ey-player.y)<2);
    if(t2<100){
      var type=Math.random()<0.3?'fast':'normal';
      enemies.push({x:ex+0.5,y:ey+0.5,type:type,speed:type==='fast'?0.025:0.015,lastMove:0});
    }
  }
  
  player.x=1.5;player.y=1.5;player.angle=0;
  particles=[];
  flash=20;
  transitioning=false;
}

// --- RAYCASTING ---
function castRay(angle){
  var sin=Math.sin(angle),cos=Math.cos(angle);
  var x=player.x,y=player.y;
  for(var depth=0;depth<MAX_DEPTH;depth+=0.05){
    x+=cos*0.05;
    y+=sin*0.05;
    if(isWall(x,y))return Math.sqrt((x-player.x)*(x-player.x)+(y-player.y)*(y-player.y));
  }
  return MAX_DEPTH;
}



// --- MOVEMENT ---
function updatePlayer(){
  var moveX=0,moveY=0;
  
  // Rotation
  if(keys['ArrowLeft']||keys['a']||keys['A'])player.angle-=player.rotSpeed;
  if(keys['ArrowRight']||keys['d']||keys['D'])player.angle+=player.rotSpeed;
  
  // Forward/back
  var sin=Math.sin(player.angle),cos=Math.cos(player.angle);
  if(keys['ArrowUp']||keys['w']||keys['W']){moveX+=cos*player.moveSpeed;moveY+=sin*player.moveSpeed;}
  if(keys['ArrowDown']||keys['s']||keys['S']){moveX-=cos*player.moveSpeed;moveY-=sin*player.moveSpeed;}
  
  // Strafe (Q/E)
  if(keys['q']||keys['Q']){moveX+=sin*player.moveSpeed;moveY-=cos*player.moveSpeed;}
  if(keys['e']||keys['E']){moveX-=sin*player.moveSpeed;moveY+=cos*player.moveSpeed;}
  
  // Collision
  var newX=player.x+moveX,newY=player.y+moveY;
  var buffer=0.25;
  var moved=false;
  if(!isWall(newX,newY)){
    player.x=newX;
    player.y=newY;
    moved=true;
  }else{
    // Try sliding along walls
    if(!isWall(newX,player.y)){player.x=newX;moved=true;}
    if(!isWall(player.x,newY)){player.y=newY;moved=true;}
  }
  // Footstep sound
  if(moved&&frame-lastStepFrame>8){sndStep();lastStepFrame=frame;}
}

// --- ENEMY AI ---
function updateEnemies(){
  for(var i=enemies.length-1;i>=0;i--){
    var e=enemies[i];
    if(frame-e.lastMove<(powerActive?4:1)){continue;}
    e.lastMove=frame;
    
    var dx=player.x-e.x,dy=player.y-e.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    
    // Check collision with player
    if(dist<0.4){
      enemies.splice(i,1);
      lives--;
      shake=10;
      sndHit();
      addParticles(W/2,H/2,12,'255,0,60');
      showHint('CONNECTION DISRUPTED');
      continue;
    }
    
    // Move toward player (chase probability based on type)
    var chaseChance=e.type==='fast'?0.7:0.5;
    if(Math.random()<chaseChance&&!powerActive){
      var moveX=dx/dist*e.speed,moveY=dy/dist*e.speed;
      var newX=e.x+moveX,newY=e.y+moveY;
      if(!isWall(newX,e.y))e.x=newX;
      if(!isWall(e.x,newY))e.y=newY;
    }else{
      // Random walk
      var dirs=[[e.speed,0],[-e.speed,0],[0,e.speed],[0,-e.speed]];
      var d=dirs[Math.floor(Math.random()*4)];
      if(!isWall(e.x+d[0],e.y+d[1])){e.x+=d[0];e.y+=d[1];}
    }
  }
}

// --- NODES ---
function updateNodes(){
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    if(n.collected)continue;
    n.pulse=(n.pulse+0.08)%(Math.PI*2);
    var dx=player.x-n.x,dy=player.y-n.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<0.4){
      n.collected=true;
      score+=40;
      sndCollect();
      addParticles(W/2,H/2,8,'0,255,170');
      showHint('SIGNAL NODE ACQUIRED');
    }
  }
  
  var allCollected=nodes.every(function(n){return n.collected;});
  if(allCollected&&!exitNode.unlocked){
    exitNode.unlocked=true;
    sndExit();
    showHint('EXIT PORTAL UNLOCKED');
    addParticles(W/2,H/2,16,'0,212,255');
  }
  
  if(exitNode.unlocked&&!transitioning){
    var edx=player.x-exitNode.x,edy=player.y-exitNode.y;
    if(edx*edx+edy*edy<0.5){
      transitioning=true;
      floor++;
      score+=150+floor*40;
      sndExit();
      layerLabel.textContent=layerStr(floor);
      showHint('// '+layerStr(floor)+' ACCESSED //');
      spawnFloor();
    }
  }
}

// --- POWER ---
function usePower(){
  if(!running||powerCooldown>0||powerActive)return;
  powerActive=true;
  powerTimer=180;
  powerCooldown=600;
  sndPower();
  showHint('ISOLATION.EXE // ENTITIES SLOWED');
}

// --- PARTICLES ---
function addParticles(x,y,count,rgb){
  for(var i=0;i<count;i++){
    var a=rnd(0,Math.PI*2),s=rnd(1,3);
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20,rgb:rgb});
  }
}

function updateParticles(){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=0.94;p.vy*=0.94;
    p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

// --- RENDER 3D ---
function render3D(){
  // Floor with perspective lines
  var gradient=ctx.createLinearGradient(0,H/2,0,H);
  gradient.addColorStop(0,'#1a1a2e');
  gradient.addColorStop(1,'#0a0a14');
  ctx.fillStyle=gradient;
  ctx.fillRect(0,H/2,W,H/2);
  
  // Floor grid lines for depth
  ctx.strokeStyle='rgba(80,80,100,0.15)';
  ctx.lineWidth=1;
  for(var i=0;i<8;i++){
    var y=H/2+(i*H/16);
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(W,y);
    ctx.stroke();
  }
  
  // Ceiling gradient
  var ceilGrad=ctx.createLinearGradient(0,0,0,H/2);
  ceilGrad.addColorStop(0,'#0a0a14');
  ceilGrad.addColorStop(1,'#1a1a28');
  ctx.fillStyle=ceilGrad;
  ctx.fillRect(0,0,W,H/2);
  
  // Cast rays
  var rayAngle=player.angle-HALF_FOV;
  for(var ray=0;ray<NUM_RAYS;ray++){
    var dist=castRay(rayAngle);
    var wallData=getWallColorAndPos(rayAngle);
    
    // Fix fisheye
    dist*=Math.cos(rayAngle-player.angle);
    
    // Wall height
    var wallHeight=Math.min(H,(H/dist)*0.66);
    var top=H/2-wallHeight/2;
    
    // Distance fog
    var fog=Math.max(0,1-dist/MAX_DEPTH);
    var brightness=fog*(powerActive?0.7:1);
    
    // Draw wall column with brick texture
    drawWallColumn(ray,top,wallHeight,wallData,brightness,dist);
    
    rayAngle+=DELTA_ANGLE;
  }
}

function getWallColorAndPos(angle){
  var sin=Math.sin(angle),cos=Math.cos(angle);
  var x=player.x,y=player.y;
  for(var depth=0;depth<MAX_DEPTH;depth+=0.05){
    x+=cos*0.05;
    y+=sin*0.05;
    if(isWall(x,y)){
      var gx=Math.floor(x),gy=Math.floor(y);
      var dx=x-gx-0.5,dy=y-gy-0.5;
      var horizontal=Math.abs(dx)>Math.abs(dy);
      var offset=horizontal?(y%1):(x%1);
      return {horizontal:horizontal,offset:offset,x:x,y:y};
    }
  }
  return {horizontal:true,offset:0,x:x,y:y};
}

function drawWallColumn(x,top,height,wallData,brightness,dist){
  // Base wall color (darker, more realistic)
  var baseR=wallData.horizontal?65:75;
  var baseG=wallData.horizontal?60:70;
  var baseB=wallData.horizontal?55:65;
  
  // Apply brightness
  var r=Math.floor(baseR*brightness);
  var g=Math.floor(baseG*brightness);
  var b=Math.floor(baseB*brightness);
  
  // Draw main wall
  ctx.fillStyle='rgb('+r+','+g+','+b+')';
  ctx.fillRect(x,top,1,height);
  
  // Add brick lines (horizontal mortar lines)
  if(height>20){
    var brickHeight=height/8;
    ctx.strokeStyle='rgba(0,0,0,'+(0.4*brightness)+')';
    ctx.lineWidth=1;
    for(var i=1;i<8;i++){
      var lineY=top+i*brickHeight;
      var offset=(Math.floor((wallData.offset*4+i*0.5))%2)*0.5;
      if(Math.random()<0.8){
        ctx.beginPath();
        ctx.moveTo(x,lineY);
        ctx.lineTo(x+1,lineY);
        ctx.stroke();
      }
    }
  }
  
  // Add vertical gradient for lighting
  if(height>40){
    var gradAlpha=0.15*brightness;
    ctx.fillStyle='rgba(255,255,255,'+gradAlpha+')';
    ctx.fillRect(x,top,1,height*0.3);
  }
}



// --- RENDER SPRITES (enemies, nodes, exit) ---
function renderSprites(){
  var sprites=[];
  
  // Nodes
  for(var i=0;i<nodes.length;i++){
    var n=nodes[i];
    if(!n.collected){
      var dx=n.x-player.x,dy=n.y-player.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var angle=Math.atan2(dy,dx)-player.angle;
      sprites.push({dist:dist,angle:angle,type:'node',obj:n});
    }
  }
  
  // Exit
  if(exitNode.unlocked){
    var edx=exitNode.x-player.x,edy=exitNode.y-player.y;
    var edist=Math.sqrt(edx*edx+edy*edy);
    var eangle=Math.atan2(edy,edx)-player.angle;
    sprites.push({dist:edist,angle:eangle,type:'exit'});
  }
  
  // Enemies
  for(var e=0;e<enemies.length;e++){
    var en=enemies[e];
    var dx2=en.x-player.x,dy2=en.y-player.y;
    var dist2=Math.sqrt(dx2*dx2+dy2*dy2);
    var angle2=Math.atan2(dy2,dx2)-player.angle;
    sprites.push({dist:dist2,angle:angle2,type:'enemy',obj:en});
  }
  
  // Sort back to front
  sprites.sort(function(a,b){return b.dist-a.dist;});
  
  for(var s=0;s<sprites.length;s++){
    var sp=sprites[s];
    
    // Normalize angle to [-PI, PI]
    while(sp.angle>Math.PI)sp.angle-=Math.PI*2;
    while(sp.angle<-Math.PI)sp.angle+=Math.PI*2;
    
    if(Math.abs(sp.angle)>HALF_FOV+0.2)continue; // Out of view
    
    var screenX=W/2+(sp.angle/HALF_FOV)*(W/2);
    var size=Math.min(H,(H/sp.dist)*0.4);
    var fog2=Math.max(0,1-sp.dist/MAX_DEPTH);
    
    ctx.save();
    ctx.globalAlpha=fog2*(powerActive?0.5:1);
    
    if(sp.type==='node'){
      // Glowing orb like in Lain
      var pulse=0.6+0.4*Math.sin(sp.obj.pulse);
      var grad=ctx.createRadialGradient(screenX,H/2,0,screenX,H/2,size*0.5*pulse);
      grad.addColorStop(0,'rgba(180,255,220,0.9)');
      grad.addColorStop(0.5,'rgba(100,255,200,0.5)');
      grad.addColorStop(1,'rgba(50,200,150,0)');
      ctx.shadowBlur=20*pulse;
      ctx.shadowColor='#00ffaa';
      ctx.fillStyle=grad;
      ctx.beginPath();
      ctx.arc(screenX,H/2,size*0.4*pulse,0,Math.PI*2);
      ctx.fill();
    }else if(sp.type==='exit'){
      // Bright portal glow
      var pGrad=ctx.createRadialGradient(screenX,H/2,0,screenX,H/2,size*0.7);
      pGrad.addColorStop(0,'rgba(220,255,255,0.95)');
      pGrad.addColorStop(0.4,'rgba(100,200,255,0.6)');
      pGrad.addColorStop(1,'rgba(0,150,255,0)');
      ctx.shadowBlur=25;
      ctx.shadowColor='#00d4ff';
      ctx.fillStyle=pGrad;
      ctx.beginPath();
      ctx.arc(screenX,H/2,size*0.6,0,Math.PI*2);
      ctx.fill();
    }else if(sp.type==='enemy'){
      // Glowing humanoid silhouette like Lain figure
      var col=sp.obj.type==='fast'?'rgba(255,200,150,':'rgba(255,150,120,';
      var alpha=0.85;
      
      // Body glow
      var bodyGrad=ctx.createRadialGradient(screenX,H/2,0,screenX,H/2,size*0.6);
      bodyGrad.addColorStop(0,col+alpha+')');
      bodyGrad.addColorStop(0.5,col+(alpha*0.5)+')');
      bodyGrad.addColorStop(1,'rgba(255,100,80,0)');
      ctx.shadowBlur=18;
      ctx.shadowColor=sp.obj.type==='fast'?'#ffaa00':'#ff5555';
      ctx.fillStyle=bodyGrad;
      
      // Draw humanoid shape
      ctx.beginPath();
      // Head
      ctx.arc(screenX,H/2-size*0.35,size*0.15,0,Math.PI*2);
      ctx.fill();
      
      // Body
      ctx.fillRect(screenX-size*0.12,H/2-size*0.2,size*0.24,size*0.5);
      
      // Legs suggestion
      ctx.fillRect(screenX-size*0.1,H/2+size*0.25,size*0.08,size*0.2);
      ctx.fillRect(screenX+size*0.02,H/2+size*0.25,size*0.08,size*0.2);
    }
    
    ctx.restore();
  }
}

// --- MINIMAP ---
function renderMinimap(){
  var mmSize=60,mmX=W-mmSize-5,mmY=5;
  var cellSize=mmSize/COLS;
  
  ctx.fillStyle='rgba(0,10,20,0.7)';
  ctx.fillRect(mmX,mmY,mmSize,mmSize);
  
  // Walls
  ctx.fillStyle='#003d6e';
  for(var y=0;y<ROWS;y++){
    for(var x=0;x<COLS;x++){
      if(maze[y][x]===1)ctx.fillRect(mmX+x*cellSize,mmY+y*cellSize,cellSize,cellSize);
    }
  }
  
  // Nodes
  ctx.fillStyle='#00ffaa';
  for(var i=0;i<nodes.length;i++){
    if(!nodes[i].collected){
      var n=nodes[i];
      ctx.fillRect(mmX+n.x*cellSize-1,mmY+n.y*cellSize-1,2,2);
    }
  }
  
  // Exit
  if(exitNode.unlocked){
    ctx.fillStyle='#00d4ff';
    ctx.fillRect(mmX+exitNode.x*cellSize-1,mmY+exitNode.y*cellSize-1,3,3);
  }
  
  // Enemies
  ctx.fillStyle='#ff003c';
  for(var e=0;e<enemies.length;e++){
    var en=enemies[e];
    ctx.fillRect(mmX+en.x*cellSize-1,mmY+en.y*cellSize-1,2,2);
  }
  
  // Player
  ctx.save();
  ctx.translate(mmX+player.x*cellSize,mmY+player.y*cellSize);
  ctx.rotate(player.angle);
  ctx.fillStyle='#ffffff';
  ctx.beginPath();
  ctx.moveTo(3,0);
  ctx.lineTo(-2,2);
  ctx.lineTo(-2,-2);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  
  ctx.strokeStyle='#0088aa';
  ctx.lineWidth=1;
  ctx.strokeRect(mmX,mmY,mmSize,mmSize);
}

// --- HUD ---
function renderHUD(){
  ctx.fillStyle='rgba(15,15,25,0.7)';
  ctx.fillRect(0,0,W,16);
  
  ctx.fillStyle='#cccccc';
  ctx.font='bold 9px monospace';
  ctx.fillText('SCR:'+score,6,11);
  
  var liveStr='LIF:';
  for(var i=0;i<Math.max(3,lives);i++)liveStr+=(i<lives?'■':'□');
  ctx.fillText(liveStr,W/2-30,11);
  ctx.fillText(layerStr(floor),W-50,11);
  
  // Power bar
  var pct=powerCooldown>0?(1-powerCooldown/600):1;
  ctx.fillStyle='rgba(40,40,60,0.5)';
  ctx.fillRect(0,H-3,W,3);
  ctx.fillStyle=powerActive?'rgba(200,180,255,0.7)':'rgba(180,180,200,0.5)';
  ctx.fillRect(0,H-3,W*pct,3);
}

// --- PARTICLES OVERLAY ---
function renderParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var a=p.life/20;
    ctx.fillStyle='rgba('+p.rgb+','+a+')';
    ctx.fillRect(p.x-1,p.y-1,2,2);
  }
}

// --- MAIN LOOP ---
function loop(){
  if(!running){
    if(!started)requestAnimationFrame(drawTitle);
    return;
  }
  frame++;
  
  // Ambient sound
  sndAmbient();
  
  // Timers
  if(powerActive){powerTimer--;if(powerTimer<=0)powerActive=false;}
  if(powerCooldown>0)powerCooldown--;
  if(flash>0)flash--;
  
  try{
    updatePlayer();
    updateEnemies();
    updateNodes();
    updateParticles();
  }catch(err){
    console.error('Game loop error:',err);
  }
  
  // Render
  ctx.save();
  if(shake>0){
    shake--;
    ctx.translate(rnd(-2,2),rnd(-2,2));
  }
  
  render3D();
  renderSprites();
  renderHUD();
  renderParticles();
  
  if(flash>0){
    ctx.fillStyle='rgba(255,255,255,'+(flash/20*0.15)+')';
    ctx.fillRect(0,0,W,H);
  }
  
  ctx.restore();
  
  // Status
  powerDisplay.textContent=powerActive?'PWR:ACTIVE':powerCooldown>0?'PWR:'+(Math.floor((1-powerCooldown/600)*100))+'%':'PWR:READY [SPC]';
  
  // Game over
  if(lives<=0){
    running=false;
    ctx.fillStyle='rgba(10,10,20,0.95)';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.textAlign='center';
    ctx.shadowBlur=22;
    ctx.shadowColor='#ff8888';
    ctx.fillStyle='#ffaaaa';
    ctx.font='bold 16px "VT323",monospace';
    ctx.fillText('CONNECTION LOST',W/2,H/2-20);
    ctx.shadowBlur=0;
    ctx.fillStyle='#cccccc';
    ctx.font='9px monospace';
    ctx.fillText('SCORE: '+score+' LAYER: '+floor,W/2,H/2);
    ctx.fillStyle='#888888';
    ctx.font='8px monospace';
    ctx.fillText('[ CLICK TO RECONNECT ]',W/2,H/2+20);
    ctx.restore();
    return;
  }
  
  requestAnimationFrame(loop);
}

// --- TITLE SCREEN ---
function drawTitle(){
  // Darker background gradient
  var bgGrad=ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#0a0a14');
  bgGrad.addColorStop(1,'#1a1a2e');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,W,H);
  
  var t=Date.now()*0.0005;
  for(var i=0;i<5;i++){
    var sc=((i/5+t)%1);sc=sc*sc;
    ctx.strokeStyle='rgba(180,180,200,'+(sc*0.25)+')';
    ctx.lineWidth=0.5;
    ctx.strokeRect(W/2-sc*W*0.46,H/2-sc*H*0.46,sc*W*0.92,sc*H*0.92);
  }
  
  ctx.save();
  ctx.textAlign='center';
  ctx.shadowBlur=22;
  ctx.shadowColor='#ffffff';
  ctx.fillStyle='#ffffff';
  ctx.font='bold 24px "VT323",monospace';
  ctx.fillText('PHANTOMa',W/2,H/2-46);
  ctx.shadowBlur=0;
  ctx.fillStyle='#aaaaaa';
  ctx.font='8px monospace';
  ctx.fillText('SERIAL EXPERIMENTS LAIN // WIRED TAG GAME',W/2,H/2-26);
  ctx.fillStyle='#cccccc';
  ctx.font='9px monospace';
  ctx.fillText('EVADE THE GLOWING ENTITIES // COLLECT SIGNAL NODES',W/2,H/2-8);
  ctx.fillText('W/S=MOVE A/D=TURN Q/E=STRAFE ARROWS=TURN',W/2,H/2+7);
  ctx.fillText('SPACE=ISOLATION.EXE (SLOW ENTITIES)',W/2,H/2+20);
  ctx.fillStyle='#888888';
  ctx.font='7px monospace';
  ctx.fillText('TAG GAME // DON\'T GET CAUGHT // REACH THE EXIT',W/2,H/2+35);
  ctx.fillStyle='#ffffff';
  ctx.font='10px monospace';
  if(Math.sin(Date.now()*0.004)>0)ctx.fillText('[ CLICK TO ENTER THE WIRED ]',W/2,H/2+55);
  if(highScore>0){
    ctx.fillStyle='#666666';
    ctx.font='8px monospace';
    ctx.fillText('HIGH SCORE: '+highScore,W/2,H/2+70);
  }
  ctx.restore();
  
  if(!started)requestAnimationFrame(drawTitle);
}

// --- RESET ---
function reset(){
  if(score>highScore)highScore=score;
  score=0;
  lives=3;
  floor=1;
  frame=0;
  powerActive=false;
  powerTimer=0;
  powerCooldown=0;
  shake=0;
  flash=0;
  transitioning=false;
  layerLabel.textContent=layerStr(1);
  running=true;
  started=true;
  spawnFloor();
  requestAnimationFrame(loop);
}

// --- EVENTS ---
cv.addEventListener('click',function(){
  if(!started||!running){reset();return;}
});

document.addEventListener('keydown',function(e){
  var k=e.key;
  if(k==='ArrowUp'||k==='ArrowDown'||k==='ArrowLeft'||k==='ArrowRight'||
     k==='w'||k==='W'||k==='a'||k==='A'||k==='s'||k==='S'||k==='d'||k==='D'||
     k==='q'||k==='Q'||k==='e'||k==='E'||k===' '||k==='Shift'){
    e.preventDefault();
  }
  if(k==='Shift')return;
  keys[k]=true;
  if(k===' ')usePower();
});

document.addEventListener('keyup',function(e){
  keys[e.key]=false;
});

// === LOGIN SYSTEM ===
var loginScreen=document.getElementById('login-screen');
var loginUser=document.getElementById('login-user');
var loginPass=document.getElementById('login-pass');
var loginBtn=document.getElementById('login-btn');
var loginError=document.getElementById('login-error');
var gameWrap=document.getElementById('wrap');

function checkLogin(){
  var user=loginUser.value.toUpperCase().trim();
  var pass=loginPass.value.toUpperCase().trim();
  
  if(user==='LAIN'&&pass==='PRESENT_DAY'){
    loginError.style.color='#aaffaa';
    loginError.textContent='// ACCESS GRANTED // ENTERING WIRED //';
    setTimeout(function(){
      loginScreen.style.display='none';
      gameWrap.style.display='block';
      initAudio();
      drawTitle();
    },800);
  }else{
    loginError.style.color='#ff8888';
    loginError.textContent='// ACCESS DENIED // CREDENTIALS INVALID //';
    loginUser.value='';
    loginPass.value='';
    loginUser.focus();
  }
}

loginBtn.addEventListener('click',checkLogin);
loginUser.addEventListener('keypress',function(e){if(e.key==='Enter')checkLogin();});
loginPass.addEventListener('keypress',function(e){if(e.key==='Enter')checkLogin();});

loginUser.focus();
})();
</script>
